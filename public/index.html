<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Task Tracker</h1>
        
        <div class="dashboard">
            <span id="taskCounter">Задач: 0</span>
            <div class="filters">
                <button class="filter-btn active" onclick="setFilter('all')">Всі</button>
                <button class="filter-btn" onclick="setFilter('active')">Активні</button>
                <button class="filter-btn" onclick="setFilter('done')">Виконані</button>
            </div>
        </div>

        <div class="input-area">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Нова задача...">
                <button id="addBtn">Додати</button>
            </div>
            <div class="options-group">
                <select id="categoryInput">
                    <option value="Робота">Робота</option>
                    <option value="Навчання">Навчання</option>
                    <option value="Особисте" selected>Особисте</option>
                </select>
                <input type="date" id="dateInput">
                <label class="priority-label">
                    <input type="checkbox" id="priorityInput"> Важливо
                </label>
            </div>
        </div>

        <div id="taskList"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
